<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hot Wheels Ultra Realism</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: sans-serif; }
        
        /* UI */
        #menu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #222, #000);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
        #menu h1 { color: #ff0000; font-size: 3.5rem; text-shadow: 0 0 20px #ff0000; margin-bottom: 30px; letter-spacing: 5px; }
        #start-btn { 
            padding: 20px 60px; font-size: 1.8rem; background: #fff; color: #000; 
            border: none; border-radius: 50px; cursor: pointer; font-weight: 900;
            transition: 0.3s; box-shadow: 0 0 30px rgba(255,255,255,0.4);
        }
        #start-btn:active { transform: scale(0.9); }

        #ui { position: absolute; bottom: 40px; width: 100%; display: none; justify-content: space-around; pointer-events: none; z-index: 10; }
        .btn { 
            width: 100px; height: 100px; background: rgba(255,255,255,0.1); 
            backdrop-filter: blur(10px); border: 2px solid rgba(255,255,255,0.3); 
            border-radius: 50%; color: white; display: flex; align-items: center; 
            justify-content: center; font-weight: bold; pointer-events: auto;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }
        .btn:active { background: #ff0000; border-color: #ff0000; }
        
        #speedometer {
            position: absolute; top: 20px; right: 20px; color: white; font-size: 1.5rem;
            font-family: monospace; display: none;
        }
    </style>
</head>
<body>

<div id="menu">
    <h1>RACE OFF</h1>
    <button id="start-btn">START RACE</button>
</div>

<div id="speedometer">000 KM/H</div>

<div id="ui">
    <div class="btn" id="brake">BRAKE</div>
    <div class="btn" id="gas">GAS</div>
</div>

<script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.132.2';
    import * as CANNON from 'https://cdn.skypack.dev/cannon-es';
    import { GLTFLoader } from 'https://cdn.skypack.dev/three@0.132.2/examples/jsm/loaders/GLTFLoader.js';

    let gameStarted = false;

    // --- СЦЕНА ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a0a);
    // Добавим туман для реалистичности глубины
    scene.fog = new THREE.Fog(0x0a0a0a, 20, 100);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ReinhardToneMapping; // Для реалистичного света
    document.body.appendChild(renderer.domElement);

    // СВЕТ
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const mainLight = new THREE.DirectionalLight(0xffffff, 1.5);
    mainLight.position.set(20, 50, 20);
    mainLight.castShadow = true;
    mainLight.shadow.mapSize.width = 2048;
    mainLight.shadow.mapSize.height = 2048;
    scene.add(mainLight);

    // --- ФИЗИКА ---
    const world = new CANNON.World();
    world.gravity.set(0, -18, 0);

    // --- ТРАССА ---
    function createTrack() {
        const material = new THREE.MeshStandardMaterial({ 
            color: 0xff3300, 
            roughness: 0.2, 
            metalness: 0.8 
        });

        // Создаем длинную трассу
        const segments = 10;
        for(let i = 0; i < segments; i++) {
            const width = 8, length = 100;
            const body = new CANNON.Body({
                mass: 0,
                shape: new CANNON.Box(new CANNON.Vec3(length/2, 0.5, width/2)),
                position: new CANNON.Vec3(i * length - 10, -0.5, 0)
            });
            world.addBody(body);

            const mesh = new THREE.Mesh(new THREE.BoxGeometry(length, 1, width), material);
            mesh.position.copy(body.position);
            mesh.receiveShadow = true;
            scene.add(mesh);
            
            // Бортики
            const wallGeo = new THREE.BoxGeometry(length, 1.2, 0.4);
            const wallMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
            const leftW = new THREE.Mesh(wallGeo, wallMat);
            leftW.position.set(mesh.position.x, 0.6, 3.8);
            scene.add(leftW);
            const rightW = new THREE.Mesh(wallGeo, wallMat);
            rightW.position.set(mesh.position.x, 0.6, -3.8);
            scene.add(rightW);
        }
        
        // Маленький трамплин для теста
        const rampBody = new CANNON.Body({
            mass: 0,
            shape: new CANNON.Box(new CANNON.Vec3(4, 1, 4)),
            position: new CANNON.Vec3(40, 0, 0)
        });
        rampBody.quaternion.setFromEuler(0, 0, 0.3);
        world.addBody(rampBody);
        const rampMesh = new THREE.Mesh(new THREE.BoxGeometry(8, 2, 8), material);
        rampMesh.position.copy(rampBody.position);
        rampMesh.quaternion.copy(rampBody.quaternion);
        scene.add(rampMesh);
    }
    createTrack();

    // --- МАШИНА ---
    const chassisShape = new CANNON.Box(new CANNON.Vec3(1.1, 0.35, 0.6));
    const chassisBody = new CANNON.Body({ mass: 400 }); // Тяжелая машина
    chassisBody.addShape(chassisShape);
    chassisBody.position.set(0, 5, 0);

    const vehicle = new CANNON.RaycastVehicle({
        chassisBody: chassisBody,
        indexRightAxis: 2, indexUpAxis: 1, indexForwardAxis: 0
    });

    const wheelOptions = {
        radius: 0.4,
        directionLocal: new CANNON.Vec3(0, -1, 0),
        suspensionStiffness: 50,
        suspensionRestLength: 0.35,
        frictionSlip: 2.5,
        dampingRelaxation: 2.8,
        dampingCompression: 4.5,
        maxSuspensionForce: 100000,
        axleLocal: new CANNON.Vec3(0, 0, 1),
        chassisConnectionPointLocal: new CANNON.Vec3(1, 1, 0),
        maxSuspensionTravel: 0.3
    };

    [new CANNON.Vec3(1, -0.1, 0.7), new CANNON.Vec3(1, -0.1, -0.7),
     new CANNON.Vec3(-1, -0.1, 0.7), new CANNON.Vec3(-1, -0.1, -0.7)].forEach(pos => {
        wheelOptions.chassisConnectionPointLocal.copy(pos);
        vehicle.addWheel(wheelOptions);
    });
    vehicle.addToWorld(world);

    const wheelMeshes = [];
    const wheelGeom = new THREE.CylinderGeometry(0.4, 0.4, 0.35, 24);
    wheelGeom.rotateX(Math.PI/2);
    const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.5 });
    for(let i=0; i<4; i++) {
        const m = new THREE.Mesh(wheelGeom, wheelMat);
        m.castShadow = true;
        scene.add(m);
        wheelMeshes.push(m);
    }

    let carModel;
    const loader = new GLTFLoader();
    // Используем максимально качественную бесплатную модель McLaren
    loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/Ferrari.glb', (gltf) => {
        carModel = gltf.scene;
        carModel.traverse(child => {
            if(child.isMesh) {
                child.castShadow = true;
                // Делаем краску реалистичной
                if(child.name.includes('body')) {
                    child.material.metalness = 1;
                    child.material.roughness = 0.1;
                    child.material.color.set(0xff0000); // Красный Hot Wheels
                }
            }
        });
        scene.add(carModel);
    });

    // --- РЕСПАУН ---
    function checkRespawn() {
        // Если машина упала ниже -10 метров или улетела далеко вбок
        if(chassisBody.position.y < -10 || Math.abs(chassisBody.position.z) > 15) {
            chassisBody.position.set(0, 5, 0); // Возврат на старт
            chassisBody.velocity.set(0, 0, 0); // Остановка
            chassisBody.angularVelocity.set(0, 0, 0);
            chassisBody.quaternion.set(0, 0, 0, 1);
        }
    }

    // --- УПРАВЛЕНИЕ ---
    let engineForce = 0;
    let brakingForce = 0;
    const gasBtn = document.getElementById('gas');
    const brakeBtn = document.getElementById('brake');

    gasBtn.ontouchstart = () => engineForce = -3500;
    gasBtn.ontouchend = () => engineForce = 0;
    brakeBtn.ontouchstart = () => brakingForce = 60;
    brakeBtn.ontouchend = () => brakingForce = 0;

    // --- ГЕЙМЛУП ---
    const speedo = document.getElementById('speedometer');

    function animate() {
        requestAnimationFrame(animate);
        if(!gameStarted) return;

        world.step(1/60);
        checkRespawn();

        // Обновление физики автомобиля
        vehicle.applyEngineForce(engineForce, 2);
        vehicle.applyEngineForce(engineForce, 3);
        vehicle.setBrake(brakingForce, 0);
        vehicle.setBrake(brakingForce, 1);
        vehicle.setBrake(brakingForce, 2);
        vehicle.setBrake(brakingForce, 3);

        if(carModel) {
            carModel.position.copy(chassisBody.position);
            carModel.position.y -= 0.2; // Смещение визуальной модели
            carModel.quaternion.copy(chassisBody.quaternion);
        }

        for (let i = 0; i < vehicle.wheelInfos.length; i++) {
            vehicle.updateWheelTransform(i);
            const t = vehicle.wheelInfos[i].worldTransform;
            wheelMeshes[i].position.copy(t.position);
            wheelMeshes[i].quaternion.copy(t.quaternion);
        }

        // Камера (динамическая)
        const speed = Math.abs(chassisBody.velocity.x);
        camera.position.lerp(new THREE.Vector3(
            chassisBody.position.x - 12 - (speed * 0.1), 
            chassisBody.position.y + 4, 
            12
        ), 0.1);
        camera.lookAt(chassisBody.position.x + 5, chassisBody.position.y, 0);

        speedo.innerText = Math.floor(speed * 3.6) + " KM/H";

        renderer.render(scene, camera);
    }

    document.getElementById('start-btn').onclick = () => {
        document.getElementById('menu').style.display = 'none';
        document.getElementById('ui').style.display = 'flex';
        document.getElementById('speedometer').style.display = 'block';
        gameStarted = true;
        animate();
    };

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
