<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hot Wheels Ultra HD</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #menu {
            position: absolute; width: 100%; height: 100%; background: radial-gradient(circle, #333, #000);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
        #start-btn {
            padding: 20px 50px; font-size: 1.5rem; background: #ff0044; color: white;
            border: none; border-radius: 10px; font-weight: bold; cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 0, 68, 0.5);
        }
        #ui { position: absolute; bottom: 40px; width: 100%; display: none; justify-content: space-around; z-index: 10; pointer-events: none; }
        .btn {
            width: 85px; height: 85px; background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50%; color: white; display: flex; align-items: center;
            justify-content: center; pointer-events: auto; user-select: none;
        }
        #speedo { position: absolute; top: 20px; left: 20px; color: white; font-size: 2rem; font-weight: bold; display: none; }
    </style>
</head>
<body>

<div id="menu">
    <h1 style="color: white; margin-bottom: 20px;">SUPER RACE 3D</h1>
    <button id="start-btn">ЗАПУСК</button>
</div>

<div id="speedo">0 KM/H</div>

<div id="ui">
    <div class="btn" id="brake">ТОРМОЗ</div>
    <div class="btn" id="gas">ГАЗ</div>
</div>

<script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.132.2';
    import * as CANNON from 'https://cdn.skypack.dev/cannon-es';
    import { GLTFLoader } from 'https://cdn.skypack.dev/three@0.132.2/examples/jsm/loaders/GLTFLoader.js';

    let gameStarted = false;

    // --- СЦЕНА И РЕНДЕР ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);
    
    // Добавляем красивый градиентный фон (симуляция неба)
    const fogColor = new THREE.Color(0x1a1a1a);
    scene.fog = new THREE.FogExp2(fogColor, 0.015);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    
    // Настройки освещения для устранения темноты
    renderer.outputEncoding = THREE.sRGBEncoding;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2; 
    document.body.appendChild(renderer.domElement);

    // --- СВЕТ ---
    // HemisphereLight дает мягкий свет со всех сторон (убирает черные пятна)
    const ambient = new THREE.HemisphereLight(0xffffff, 0x444444, 1.0);
    scene.add(ambient);

    const sunLight = new THREE.DirectionalLight(0xffffff, 1.5);
    sunLight.position.set(50, 100, 50);
    sunLight.castShadow = true;
    sunLight.shadow.mapSize.width = 2048;
    sunLight.shadow.mapSize.height = 2048;
    scene.add(sunLight);

    // --- ФИЗИКА ---
    const world = new CANNON.World();
    world.gravity.set(0, -18, 0);

    // --- ТРАССА (Hot Wheels Orange) ---
    const trackMaterial = new THREE.MeshPhysicalMaterial({
        color: 0xff4400,
        metalness: 0.6,
        roughness: 0.2,
        clearcoat: 1.0
    });

    const createTrackSegment = (x) => {
        const shape = new CANNON.Box(new CANNON.Vec3(50, 1, 6));
        const body = new CANNON.Body({ mass: 0, shape });
        body.position.set(x, -1, 0);
        world.addBody(body);

        const mesh = new THREE.Mesh(new THREE.BoxGeometry(100, 2, 12), trackMaterial);
        mesh.position.copy(body.position);
        mesh.receiveShadow = true;
        scene.add(mesh);
    };

    for(let i = 0; i < 10; i++) createTrackSegment(i * 100);

    // --- МАШИНА ---
    const chassisBody = new CANNON.Body({ mass: 500 });
    chassisBody.addShape(new CANNON.Box(new CANNON.Vec3(1.2, 0.4, 0.6)));
    chassisBody.position.set(0, 5, 0);
    
    const vehicle = new CANNON.RaycastVehicle({
        chassisBody: chassisBody,
        indexRightAxis: 2, indexUpAxis: 1, indexForwardAxis: 0
    });

    // Настройка колес (улучшенная подвеска)
    const wheelOptions = {
        radius: 0.45,
        directionLocal: new CANNON.Vec3(0, -1, 0),
        suspensionStiffness: 50,
        suspensionRestLength: 0.35,
        frictionSlip: 3,
        dampingRelaxation: 2.5,
        dampingCompression: 4.0,
        axleLocal: new CANNON.Vec3(0, 0, 1),
        chassisConnectionPointLocal: new CANNON.Vec3(1, 1, 0),
        maxSuspensionTravel: 0.25
    };

    const wheelPositions = [
        new CANNON.Vec3(1.1, -0.1, 0.7), new CANNON.Vec3(1.1, -0.1, -0.7),
        new CANNON.Vec3(-1.1, -0.1, 0.7), new CANNON.Vec3(-1.1, -0.1, -0.7)
    ];

    wheelPositions.forEach(pos => {
        wheelOptions.chassisConnectionPointLocal.copy(pos);
        vehicle.addWheel(wheelOptions);
    });
    vehicle.addToWorld(world);

    // Визуальные супер-колеса
    const wheelMeshes = [];
    const createWheelMesh = () => {
        const group = new THREE.Group();
        // Шина
        const tire = new THREE.Mesh(
            new THREE.CylinderGeometry(0.45, 0.45, 0.4, 32),
            new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 })
        );
        tire.rotateX(Math.PI / 2);
        group.add(tire);
        // Диск (хром)
        const rim = new THREE.Mesh(
            new THREE.CylinderGeometry(0.25, 0.25, 0.42, 16),
            new THREE.MeshPhysicalMaterial({ color: 0xffffff, metalness: 1, roughness: 0.1 })
        );
        rim.rotateX(Math.PI / 2);
        group.add(rim);
        scene.add(group);
        return group;
    };

    for(let i=0; i<4; i++) wheelMeshes.push(createWheelMesh());

    // Загрузка модели машины
    let carModel;
    const loader = new GLTFLoader();
    loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/Ferrari.glb', (gltf) => {
        carModel = gltf.scene;
        carModel.traverse(child => {
            if(child.isMesh) {
                child.castShadow = true;
                // Применяем супер-реалистичный материал покраски
                if(child.name.includes('body')) {
                    child.material = new THREE.MeshPhysicalMaterial({
                        color: 0xcc0000,
                        metalness: 0.9,
                        roughness: 0.05,
                        clearcoat: 1.0,
                        clearcoatRoughness: 0.02
                    });
                }
            }
        });
        scene.add(carModel);
    });

    // --- РЕСПАУН ---
    function checkRespawn() {
        if (chassisBody.position.y < -15) {
            chassisBody.position.set(0, 5, 0);
            chassisBody.velocity.set(0,0,0);
            chassisBody.angularVelocity.set(0,0,0);
            chassisBody.quaternion.set(0,0,0,1);
        }
    }

    // --- УПРАВЛЕНИЕ ---
    let engineForce = 0;
    document.getElementById('gas').ontouchstart = () => engineForce = -4000;
    document.getElementById('gas').ontouchend = () => engineForce = 0;
    document.getElementById('brake').ontouchstart = () => engineForce = 2000;
    document.getElementById('brake').ontouchend = () => engineForce = 0;

    // --- ЦИКЛ ---
    const speedo = document.getElementById('speedo');
    function animate() {
        requestAnimationFrame(animate);
        if(!gameStarted) return;

        world.step(1/60);
        checkRespawn();

        vehicle.applyEngineForce(engineForce, 2);
        vehicle.applyEngineForce(engineForce, 3);

        if(carModel) {
            carModel.position.copy(chassisBody.position);
            carModel.position.y -= 0.4;
            carModel.quaternion.copy(chassisBody.quaternion);
        }

        for (let i = 0; i < vehicle.wheelInfos.length; i++) {
            vehicle.updateWheelTransform(i);
            const t = vehicle.wheelInfos[i].worldTransform;
            wheelMeshes[i].position.copy(t.position);
            wheelMeshes[i].quaternion.copy(t.quaternion);
        }

        // Камера
        camera.position.lerp(new THREE.Vector3(chassisBody.position.x - 12, chassisBody.position.y + 4, 15), 0.1);
        camera.lookAt(chassisBody.position.x, chassisBody.position.y, 0);

        speedo.innerText = Math.floor(Math.abs(chassisBody.velocity.x) * 3.6) + " KM/H";
        renderer.render(scene, camera);
    }

    document.getElementById('start-btn').onclick = () => {
        document.getElementById('menu').style.display = 'none';
        document.getElementById('ui').style.display = 'flex';
        document.getElementById('speedo').style.display = 'block';
        gameStarted = true;
        animate();
    };
</script>
</body>
</html>
